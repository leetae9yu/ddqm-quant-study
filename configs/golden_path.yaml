data:
  start_date: "1925-01-01"
  end_date: "2026-05-04"
  data_dir: "data"

panel:
  frequency: "monthly"
  universe:
    share_codes: [10, 11]
    exchange_codes: [1, 2, 3]
    min_market_cap: 50000000
    exclude_financials: false
  forward_horizons: [1, 3, 6]

features:
  families:
    compustat: true
    crsp: true
    ibes: true
    macro: true
  pit_availability:
    compustat_lag_days: 90
    ibes_lag_days: 1
    macro_release_lag_days: 1
    forbid_future_leakage: true

model:
  name: "ridge"
  target_column: "ret_1m_fwd"
  hyperparameters:
    alpha: 1.0
  search_space:
    alpha:
      type: "float"
      min: 0.0001
      max: 100.0
      scale: "log"

splits:
  train_fraction: 0.70
  validation_fraction: 0.15
  holdout_fraction: 0.15

budget:
  max_trials: 24
  max_runtime_minutes: 120
  retry_limit: 2

promotion:
  required_metrics:
    - "rank_ic"
    - "decile_long_short_return"
    - "feature_coverage"
  metric_thresholds:
    rank_ic: 0.01
    decile_long_short_return: 0.0
    feature_coverage: 0.85

report:
  template: "configs/report_templates/golden_path.md"
  output_formats: ["html", "json"]

artifacts:
  output_dir: "experiments/golden_path"
  retention_policy:
    keep_last: 10
    max_age_days: 180
